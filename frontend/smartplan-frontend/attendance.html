<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlan - Attendance Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex min-h-screen bg-[var(--bg)] text-[var(--fg)]">

    <!-- Sidebar -->
    <aside class="w-64 border-r border-[var(--border)] flex flex-col h-screen sticky top-0 shrink-0">
        <div class="p-6 border-b border-[var(--border)] flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-[var(--accent)] flex items-center justify-center text-white shadow-lg">
                <i class="ph ph-calendar-check text-xl"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">SmartPlan</span>
        </div>
        
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <div class="text-[10px] font-mono text-[var(--muted)] px-4 mb-2 uppercase tracking-widest">Teacher Panel</div>
            <a href="teacher-dashboard.html" class="sidebar-item">
                <i class="ph ph-house"></i> Dashboard
            </a>
            <a href="timetable.html" class="sidebar-item">
                <i class="ph ph-grid-four"></i> My Timetable
            </a>
            <a href="attendance.html" class="sidebar-item active">
                <i class="ph ph-notebook"></i> Attendance
            </a>
            
            <div class="text-[10px] font-mono text-[var(--muted)] px-4 mt-8 mb-2 uppercase tracking-widest">Resources</div>
            <a href="#" class="sidebar-item">
                <i class="ph ph-users-three"></i> My Classes
            </a>
            <a href="#" class="sidebar-item">
                <i class="ph ph-book-open"></i> Curriculum
            </a>
        </nav>
        
        <div class="p-4 border-t border-[var(--border)]">
            <div class="flex items-center gap-3 p-2 rounded-lg bg-[var(--surface-higher)]">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-blue-400 to-blue-600"></div>
                <div class="flex-1 min-w-0 text-sm">Dr. Smith</div>
                <a href="login.html" class="text-[var(--muted)]"><i class="ph ph-sign-out"></i></a>
            </div>
        </div>
    </aside>

    <div id="root" class="flex-1 flex flex-col min-w-0"></div>

    <script type="text/babel">
        const { useState } = React;

        const STUDENTS = [
            { id: 'S1024', name: 'Alice Johnson' },
            { id: 'S1025', name: 'Bob Wilson' },
            { id: 'S1026', name: 'Charlie Davis' },
            { id: 'S1027', name: 'Diana Prince' },
            { id: 'S1028', name: 'Ethan Hunt' },
            { id: 'S1029', name: 'Fiona Gallagher' },
            { id: 'S1030', name: 'George Miller' },
            { id: 'S1031', name: 'Hannah Abbott' },
            { id: 'S1032', name: 'Ian Wright' },
            { id: 'S1033', name: 'Julia Roberts' }
        ];

        const STATUS_OPTIONS = [
            { id: 'present', label: 'Present', icon: 'ph-check-circle', color: 'text-green-500' },
            { id: 'absent', label: 'Absent', icon: 'ph-x-circle', color: 'text-red-500' },
            { id: 'late', label: 'Late', icon: 'ph-clock', color: 'text-amber-500' },
            { id: 'excused', label: 'Excused', icon: 'ph-info', color: 'text-blue-500' }
        ];

        const AttendanceApp = () => {
            const [attendance, setAttendance] = useState(
                STUDENTS.reduce((acc, s) => ({ ...acc, [s.id]: 'present' }), {})
            );
            const [isSubmitted, setIsSubmitted] = useState(false);

            const handleStatusChange = (studentId, status) => {
                setAttendance(prev => ({ ...prev, [studentId]: status }));
            };

            const handleSubmit = () => {
                setIsSubmitted(true);
                setTimeout(() => setIsSubmitted(false), 3000);
            };

            const stats = Object.values(attendance).reduce((acc, status) => {
                acc[status] = (acc[status] || 0) + 1;
                return acc;
            }, {});

            return (
                <div className="flex-1 flex flex-col h-screen overflow-hidden">
                    <header className="h-16 border-b border-[var(--border)] px-8 flex items-center justify-between bg-[var(--bg)]/80 backdrop-blur-md z-20 shrink-0">
                        <div className="flex items-center gap-4">
                            <h2 className="text-lg font-semibold">Class Attendance</h2>
                            <span className="px-2 py-0.5 rounded-lg bg-[var(--surface-higher)] border border-[var(--border)] text-xs font-mono">10B • Mathematics</span>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="text-right mr-4">
                                <p className="text-[10px] text-[var(--muted)] uppercase font-mono">Current Lesson</p>
                                <p className="text-xs font-bold">08:00 — 09:30</p>
                            </div>
                            <button 
                                onClick={handleSubmit}
                                className={`btn btn-primary py-2 px-6 transition-all ${isSubmitted ? 'bg-green-600' : ''}`}
                            >
                                {isSubmitted ? (
                                    <><i className="ph ph-check"></i> Saved</>
                                ) : (
                                    <><i className="ph ph-floppy-disk"></i> Submit Register</>
                                )}
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 p-8 overflow-y-auto">
                        <div className="max-w-4xl mx-auto space-y-8">
                            {/* Summary Cards */}
                            <div className="grid grid-cols-4 gap-4">
                                {STATUS_OPTIONS.map(opt => (
                                    <div key={opt.id} className="card p-4 flex flex-col items-center justify-center text-center">
                                        <i className={`ph ${opt.icon} text-2xl ${opt.color} mb-1`}></i>
                                        <p className="text-xl font-bold font-mono">{stats[opt.id] || 0}</p>
                                        <p className="text-[10px] text-[var(--muted)] uppercase tracking-wider">{opt.label}</p>
                                    </div>
                                ))}
                            </div>

                            {/* Attendance List */}
                            <div className="card divide-y divide-[var(--border)] overflow-hidden">
                                {STUDENTS.map(student => (
                                    <div key={student.id} className="p-4 flex items-center justify-between hover:bg-[var(--surface-higher)] transition-colors">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-gradient-to-br from-gray-700 to-gray-800 flex items-center justify-center border border-[var(--border)]">
                                                <span className="text-xs font-bold opacity-50">{student.name.split(' ').map(n => n[0]).join('')}</span>
                                            </div>
                                            <div>
                                                <p className="font-bold">{student.name}</p>
                                                <p className="text-[10px] text-[var(--muted)] font-mono">{student.id}</p>
                                            </div>
                                        </div>

                                        <div className="flex gap-1 bg-[var(--bg)] p-1 rounded-lg border border-[var(--border)]">
                                            {STATUS_OPTIONS.map(opt => (
                                                <button
                                                    key={opt.id}
                                                    onClick={() => handleStatusChange(student.id, opt.id)}
                                                    className={`px-3 py-1.5 rounded-md text-[10px] font-bold uppercase tracking-wider transition-all
                                                        ${attendance[student.id] === opt.id 
                                                            ? `${opt.color.replace('text-', 'bg-')}/20 ${opt.color} border border-${opt.color.split('-')[1]}-500/20 shadow-inner` 
                                                            : 'text-[var(--muted)] hover:text-[var(--fg)] hover:bg-[var(--surface-higher)]'}
                                                    `}
                                                >
                                                    {opt.label}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </div>

                            {/* Notes Section */}
                            <div className="card p-6 space-y-4">
                                <div className="flex items-center gap-2">
                                    <i className="ph ph-note-pencil text-xl text-[var(--accent)]"></i>
                                    <h3 className="font-bold">Lesson Notes & Observations</h3>
                                </div>
                                <textarea 
                                    placeholder="Add any specific observations about the lesson or student behavior..."
                                    className="w-full h-32 p-4 rounded-xl bg-[var(--surface-higher)] border border-[var(--border)] text-sm focus:outline-none focus:border-[var(--accent)] transition-all resize-none"
                                ></textarea>
                            </div>
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AttendanceApp />);
    </script>
</body>
</html>
