<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlan - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        :root {
            /* Tech Utility Palette - Dark Mode Optimized */
            --bg: oklch(14% 0.01 250);
            --surface: oklch(18% 0.015 250);
            --fg: oklch(98% 0.005 250);
            --muted: oklch(60% 0.02 250);
            --border: oklch(25% 0.02 250);
            --accent: oklch(55% 0.15 25); /* The "not-so-flashing red" */
            --accent-muted: oklch(55% 0.15 25 / 0.1);
            
            --font-display: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-display);
        }

        .login-card {
            background-color: var(--surface);
            border: 1px solid var(--border);
            box-shadow: 0 4px 24px -2px rgba(0, 0, 0, 0.5);
        }

        .input-field {
            background-color: oklch(12% 0.01 250);
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }

        .input-field:focus {
            border-color: var(--accent);
            outline: none;
            box-shadow: 0 0 0 2px var(--accent-muted);
        }

        .btn-primary {
            background-color: var(--accent);
            color: white;
            transition: opacity 0.2s;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }

        .grid-bg {
            background-image: radial-gradient(var(--border) 1px, transparent 1px);
            background-size: 32px 32px;
        }

        .gradient-glow {
            background: radial-gradient(circle at center, var(--accent-muted) 0%, transparent 70%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center overflow-hidden">
    <div class="fixed inset-0 grid-bg opacity-20 pointer-events-none"></div>
    <div class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[800px] h-[800px] gradient-glow opacity-30 pointer-events-none"></div>

    <main class="relative z-10 w-full max-w-md px-6">
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-xl bg-[var(--surface)] border border-[var(--border)] mb-4 shadow-xl">
                <i class="ph ph-calendar-check text-2xl text-[var(--accent)]"></i>
            </div>
            <h1 class="text-3xl font-bold tracking-tight mb-2">SmartPlan</h1>
            <p class="text-[var(--muted)]">Intelligent School Management System</p>
        </div>

        <div class="login-card p-8 rounded-2xl">
            <form id="loginForm" class="space-y-6">
                <div>
                    <label class="block text-sm font-medium text-[var(--muted)] mb-2 uppercase tracking-wider font-mono">Email Address</label>
                    <input type="email" id="email" placeholder="admin@example.com" class="w-full px-4 py-3 rounded-lg input-field font-mono text-sm" required>
                </div>

                <div>
                    <label class="block text-sm font-medium text-[var(--muted)] mb-2 uppercase tracking-wider font-mono">Password</label>
                    <input type="password" id="password" placeholder="••••••••" class="w-full px-4 py-3 rounded-lg input-field font-mono text-sm" required>
                </div>

                <div id="loginError" class="text-red-500 text-sm hidden">Invalid email or password</div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-2 cursor-pointer group">
                        <input type="checkbox" class="w-4 h-4 rounded border-[var(--border)] bg-transparent accent-[var(--accent)]">
                        <span class="text-sm text-[var(--muted)] group-hover:text-[var(--fg)] transition-colors">Remember me</span>
                    </label>
                    <a href="#" class="text-sm text-[var(--accent)] hover:underline opacity-80 hover:opacity-100 transition-opacity">Forgot password?</a>
                </div>

                <button type="submit" class="w-full py-3 rounded-lg btn-primary font-semibold shadow-lg shadow-[var(--accent-muted)] flex items-center justify-center gap-2">
                    Sign In
                    <i class="ph ph-arrow-right"></i>
                </button>
            </form>

            <script>
                document.getElementById('loginForm').addEventListener('submit', async (e) => {
                    e.preventDefault();
                    const email = document.getElementById('email').value;
                    const password = document.getElementById('password').value;
                    const errorEl = document.getElementById('loginError');
                    
                    try {
                        const response = await fetch('http://localhost:3001/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ email, password })
                        });

                        if (!response.ok) throw new Error('Login failed');

                        const data = await response.json();
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('user', JSON.stringify(data.user));

                        // Redirect based on role
                        const role = data.user.role;
                        if (role === 'ADMIN') window.location.href = 'admin-dashboard.html';
                        else if (role === 'TEACHER') window.location.href = 'teacher-dashboard.html';
                        else window.location.href = 'student-dashboard.html';

                    } catch (err) {
                        errorEl.classList.remove('hidden');
                    }
                });
            </script>

            <div class="mt-8 pt-6 border-t border-[var(--border)]">
                <p class="text-xs text-[var(--muted)] text-center mb-4 uppercase tracking-widest font-mono">Demo Accounts</p>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="window.location.href='admin-dashboard.html'" class="px-2 py-2 rounded border border-[var(--border)] text-[10px] font-mono hover:bg-[var(--accent-muted)] hover:border-[var(--accent)] transition-all">ADMIN</button>
                    <button onclick="window.location.href='teacher-dashboard.html'" class="px-2 py-2 rounded border border-[var(--border)] text-[10px] font-mono hover:bg-[var(--accent-muted)] hover:border-[var(--accent)] transition-all">TEACHER</button>
                    <button onclick="window.location.href='student-dashboard.html'" class="px-2 py-2 rounded border border-[var(--border)] text-[10px] font-mono hover:bg-[var(--accent-muted)] hover:border-[var(--accent)] transition-all">STUDENT</button>
                </div>
            </div>
        </div>

        <p class="mt-8 text-center text-xs text-[var(--muted)]">
            By signing in, you agree to our <a href="#" class="underline">Terms of Service</a> and <a href="#" class="underline">Privacy Policy</a>.
        </p>
    </main>
</body>
</html>
