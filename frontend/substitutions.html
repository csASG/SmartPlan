<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartPlan - Substitution Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="flex min-h-screen bg-[var(--bg)] text-[var(--fg)]">

    <!-- Sidebar -->
    <aside class="w-64 border-r border-[var(--border)] flex flex-col h-screen sticky top-0 shrink-0">
        <div class="p-6 border-b border-[var(--border)] flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-[var(--accent)] flex items-center justify-center text-white shadow-lg">
                <i class="ph ph-calendar-check text-xl"></i>
            </div>
            <span class="font-bold text-xl tracking-tight">SmartPlan</span>
        </div>
        <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
            <div class="text-[10px] font-mono text-[var(--muted)] px-4 mb-2 uppercase tracking-widest">Management</div>
            <a href="admin-dashboard.html" class="sidebar-item">
                <i class="ph ph-house"></i> Dashboard
            </a>
            <a href="timetable.html" class="sidebar-item">
                <i class="ph ph-grid-four"></i> Timetable
            </a>
            <a href="resources.html" class="sidebar-item">
                <i class="ph ph-users"></i> Resources
            </a>
            <a href="substitutions.html" class="sidebar-item active">
                <i class="ph ph-lightning"></i> Substitutions
            </a>
        </nav>
        <div class="p-4 border-t border-[var(--border)]">
            <div class="flex items-center gap-3 p-2 rounded-lg bg-[var(--surface-higher)]">
                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-gray-400 to-gray-600"></div>
                <div class="flex-1 min-w-0 text-sm">Admin User</div>
                <a href="login.html" class="text-[var(--muted)]"><i class="ph ph-sign-out"></i></a>
            </div>
        </div>
    </aside>

    <div id="root" class="flex-1 flex flex-col min-w-0"></div>

    <script type="text/babel">
        const { useState } = React;

        const ABSENT_TEACHERS = [
            { id: 'T003', name: 'Ms. Elena Klein', reason: 'Medical', start: 'May 18', end: 'May 22', status: 'In Progress' },
            { id: 'T005', name: 'Mr. David Miller', reason: 'Training', start: 'May 19', end: 'May 19', status: 'Pending' }
        ];

        const OPEN_SLOTS = [
            { id: 1, day: 'Monday', time: '11:00', class: '10B', subject: 'Biology', room: 'L201', originalTeacher: 'Ms. Klein' },
            { id: 2, day: 'Tuesday', time: '08:00', class: '12A', subject: 'Chemistry', room: 'L202', originalTeacher: 'Ms. Klein' }
        ];

        const SubstitutionApp = () => {
            const [selectedSlot, setSelectedSlot] = useState(null);

            return (
                <div className="flex-1 flex flex-col h-screen overflow-hidden">
                    <header className="h-16 border-b border-[var(--border)] px-8 flex items-center justify-between bg-[var(--bg)]/80 backdrop-blur-md z-20 shrink-0">
                        <h2 className="text-lg font-semibold">Substitution Management</h2>
                        <button className="btn btn-primary text-xs">
                            <i class="ph ph-plus"></i> Manual Override
                        </button>
                    </header>

                    <main className="flex-1 p-8 space-y-8 overflow-y-auto">
                        {/* Absent Teachers */}
                        <section className="space-y-4">
                            <h3 className="text-sm font-mono text-[var(--muted)] uppercase tracking-widest">Active Absences</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {ABSENT_TEACHERS.map(t => (
                                    <div key={t.id} className="card p-4 flex items-center justify-between">
                                        <div className="flex items-center gap-4">
                                            <div className="w-10 h-10 rounded-full bg-red-500/10 flex items-center justify-center text-red-500 border border-red-500/20">
                                                <i class="ph ph-user-minus"></i>
                                            </div>
                                            <div>
                                                <p className="font-bold">{t.name}</p>
                                                <p className="text-[10px] text-[var(--muted)] font-mono">{t.reason} • {t.start} — {t.end}</p>
                                            </div>
                                        </div>
                                        <span className={`px-2 py-0.5 rounded-lg text-[10px] font-bold uppercase tracking-widest ${t.status === 'Pending' ? 'bg-amber-500/10 text-amber-500' : 'bg-blue-500/10 text-blue-500'}`}>
                                            {t.status}
                                        </span>
                                    </div>
                                ))}
                            </div>
                        </section>

                        {/* Open Slots */}
                        <section className="space-y-4">
                            <h3 className="text-sm font-mono text-[var(--muted)] uppercase tracking-widest">Required Substitutions</h3>
                            <div className="card divide-y divide-[var(--border)] overflow-hidden">
                                {OPEN_SLOTS.map(slot => (
                                    <div key={slot.id} className="p-4 flex items-center justify-between hover:bg-[var(--surface-higher)] transition-colors">
                                        <div className="flex gap-6 items-center">
                                            <div className="text-center w-20">
                                                <p className="text-xs font-bold">{slot.day}</p>
                                                <p className="text-[10px] text-[var(--muted)] font-mono">{slot.time}</p>
                                            </div>
                                            <div>
                                                <p className="font-bold">{slot.subject} for {slot.class}</p>
                                                <p className="text-[10px] text-[var(--muted)] uppercase font-mono">Original: {slot.originalTeacher} • Room {slot.room}</p>
                                            </div>
                                        </div>
                                        <button 
                                            onClick={() => setSelectedSlot(slot)}
                                            className="btn btn-ghost border border-[var(--border)] text-xs"
                                        >
                                            Assign Substitute
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </main>

                    {/* Assignment Modal */}
                    {selectedSlot && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/60 backdrop-blur-sm">
                            <div className="card w-full max-w-md shadow-2xl p-8 space-y-6">
                                <h3 className="text-xl font-bold">Assign Substitute</h3>
                                <p className="text-sm text-[var(--muted)]">Assigning for <b>{selectedSlot.subject}</b> ({selectedSlot.class}) on {selectedSlot.day} at {selectedSlot.time}.</p>
                                
                                <div className="space-y-4">
                                    <p className="text-[10px] text-[var(--muted)] uppercase font-mono">Available Teachers</p>
                                    <div className="space-y-2">
                                        <button className="w-full p-3 rounded-lg border border-[var(--border)] hover:border-[var(--accent)] hover:bg-[var(--accent-muted)] text-left flex items-center justify-between transition-all group">
                                            <span className="text-sm font-medium">Mr. Stark (Computer Science)</span>
                                            <span className="text-[10px] font-mono opacity-0 group-hover:opacity-100">SELECT</span>
                                        </button>
                                        <button className="w-full p-3 rounded-lg border border-[var(--border)] hover:border-[var(--accent)] hover:bg-[var(--accent-muted)] text-left flex items-center justify-between transition-all group">
                                            <span className="text-sm font-medium">Ms. White (English)</span>
                                            <span className="text-[10px] font-mono opacity-0 group-hover:opacity-100">SELECT</span>
                                        </button>
                                    </div>
                                    <button className="w-full py-2 text-xs text-red-500 font-bold uppercase tracking-widest bg-red-500/10 rounded-lg">Mark as Cancelled</button>
                                </div>

                                <div className="flex gap-3">
                                    <button className="btn btn-ghost flex-1 border border-[var(--border)]" onClick={() => setSelectedSlot(null)}>Cancel</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<SubstitutionApp />);
    </script>
</body>
</html>
